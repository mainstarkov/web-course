<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея — Всё о космосе</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Добро пожаловать в мир астрономии!</h1>
        <nav>
            <ul>
                <li><a href="index.html">Главная</a></li>
                <li><a href="gallery.html" class="active">Галерея</a></li>
                <li><a href="#">Контакты (скоро)</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="gallery-header">
            <h2>Галерея космоса</h2>
            <p id="photo-count">Загрузка...</p>

            <!-- Фильтры -->
            <div class="filters">
                <button class="filter-btn active" data-filter="all">Все</button>
                <button class="filter-btn" data-filter="planet">Планеты</button>
                <button class="filter-btn" data-filter="galaxy">Галактики</button>
                <button class="filter-btn" data-filter="star">Звёзды</button>
            </div>
        </section>

        <!-- Сетка галереи -->
        <div class="gallery-grid" id="gallery">

            <div class="gallery-item" data-category="planet">
                <img src="https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?w=500&q=85&fit=crop" alt="Марс — красная планета">
                <div class="overlay">
                    <p class="caption">Марс</p>
                    <button class="like-btn" data-id="1">♥ <span class="like-count">0</span></button>
                </div>
            </div>

            <div class="gallery-item" data-category="planet">
                <img src="https://images.unsplash.com/photo-1614314107768-6018061b5b72?w=500&q=85&fit=crop" alt="Юпитер — газовый гигант">
                <div class="overlay">
                    <p class="caption">Юпитер</p>
                    <button class="like-btn" data-id="2">♥ <span class="like-count">0</span></button>
                </div>
            </div>

            <div class="gallery-item" data-category="galaxy">
                <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=500&q=85&fit=crop" alt="Млечный путь">
                <div class="overlay">
                    <p class="caption">Млечный путь</p>
                    <button class="like-btn" data-id="3">♥ <span class="like-count">0</span></button>
                </div>
            </div>

            <div class="gallery-item" data-category="galaxy">
                <img src="https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=500&q=85&fit=crop" alt="Галактика Андромеда">
                <div class="overlay">
                    <p class="caption">Андромеда</p>
                    <button class="like-btn" data-id="4">♥ <span class="like-count">0</span></button>
                </div>
            </div>

            <div class="gallery-item" data-category="star">
                <img src="https://images.unsplash.com/photo-1543722530-d2c3201371e7?w=500&q=85&fit=crop" alt="Туманность Орёл">
                <div class="overlay">
                    <p class="caption">Туманность Орёл</p>
                    <button class="like-btn" data-id="5">♥ <span class="like-count">0</span></button>
                </div>
            </div>

            <div class="gallery-item" data-category="star">
                <img src="https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?w=500&q=85&fit=crop" alt="Поверхность Солнца">
                <div class="overlay">
                    <p class="caption">Солнце</p>
                    <button class="like-btn" data-id="6">♥ <span class="like-count">0</span></button>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <p>© Иванов Иван, студент 1 курса, 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
